name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vitest:
    name: Run vitest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npm test

  type-check:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: tsc --noEmit
        run: npm run type-check

  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"

      # --omit=dev skips devDependencies (vitest/eslint/tsc noise).
      # --audit-level=critical fails only on critical CVEs, letting
      # high/moderate flow to Dependabot's weekly group. This is a
      # pragmatic threshold for a Vercel-hosted Next.js app:
      # - postcss/uuid/xmldom CVEs tracked but not blocking (they're
      #   in build-time or narrow runtime paths like PDF export)
      # - high+moderate findings logged in the job output for review
      # - Dependabot resolves the next time a patched version publishes
      # Review the full audit manually with `npm audit --omit=dev`.
      - name: npm audit
        run: npm audit --omit=dev --audit-level=critical

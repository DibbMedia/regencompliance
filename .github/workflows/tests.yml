name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  vitest:
    name: Run vitest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run tests
        run: npm test

  type-check:
    name: TypeScript type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: tsc --noEmit
        run: npm run type-check

  npm-audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"

      # --omit=dev skips devDependencies (vitest/eslint/tsc noise).
      # --audit-level=critical fails only on critical CVEs, letting
      # high/moderate flow to Dependabot's weekly group. This is a
      # pragmatic threshold for a Vercel-hosted Next.js app:
      # - postcss/uuid/xmldom CVEs tracked but not blocking (they're
      #   in build-time or narrow runtime paths like PDF export)
      # - high+moderate findings logged in the job output for review
      # - Dependabot resolves the next time a patched version publishes
      # Review the full audit manually with `npm audit --omit=dev`.
      - name: npm audit
        run: npm audit --omit=dev --audit-level=critical

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run eslint
        run: npm run lint

  plaintext-leak-guard:
    name: Plaintext leak guard
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Scan API routes for plaintext-leak risks
        run: npm run check:plaintext-leaks

  sbom:
    # CycloneDX Software Bill of Materials. Foundation for SOC 2 + future
    # supply-chain audits (Snyk / Mend / Sysdig consume the JSON output).
    # Only runs on main + only after the upstream gates pass - we don't want
    # PRs generating noise artifacts and we don't want SBOMs for failed builds.
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: [vitest, type-check, npm-audit, lint, plaintext-leak-guard]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate SBOM (CycloneDX)
        run: npx --yes @cyclonedx/cyclonedx-npm --output-format json --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-${{ github.sha }}
          path: sbom.json
          retention-days: 90
